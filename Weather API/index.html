<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Climinha bom</title>
    <link rel="stylesheet" href="main.css">
</head>
<body>
    <h1>Aplicação de Clima(SLA MERMAO)</h1>
    <p>Você pode digitar um lugar de diversas formas:</p>
    <ul>
        <li>Nome de uma cidade(Ex: Londres)</li>
        <li>CEP (Ex:59022)</li>
        <li>Latitude e Longitude (Ex: 40.7128,-74.0060)</li>
        <li>Cidade + país (Ex: Natal,BR)</li>
        <li>Nome de um Aeroporto (Ex:Heathrow,Londres)</li>
    </ul>
    <input id="place"type="text">
    <button id="send_place">Enviar</button>

    

    <script src="weather.js"></script>
</body>
</html>
